name: Daily Flood Forecast

on:
  workflow_dispatch:
  schedule:
    # GitHub schedules use UTC. This is 1:00 AM EST.
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  run-forecast:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run flood forecast
        run: python version_8.py

      - name: Commit updated model outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add *.html *.csv *.png
          git diff --cached --quiet || git commit -m "Update daily flood forecast outputs"
          git push
